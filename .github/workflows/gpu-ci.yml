name: GPU CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  gpu-tests:
    runs-on:
      - self-hosted
      - gpu

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: skelfmmenv-gpu
          environment-file: environment-gpu.yml
          auto-activate-base: false

      - name: Verify CUDA availability
        shell: bash -l {0}
        run: |
          python -c "import torch; assert torch.cuda.is_available(), 'CUDA is not available'; print(torch.cuda.get_device_name(0), torch.version.cuda)"

      - name: Run test suite
        shell: bash -l {0}
        env:
          MPLBACKEND: Agg
        run: |
          python -m pytest -q \
            tests/test_operators.py \
            tests/test_util.py \
            tests/test_fmm.py \
            tests/test_batched.py \
            tests/test_examples.py \
            tests/test_pykeops_cuda.py
